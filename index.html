<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบส่งผลการแข่งขัน - BuddyGO Competition Organizer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Sarabun', sans-serif; -webkit-tap-highlight-color: transparent; }
        .is-locked-visual { opacity: 0.5; pointer-events: none; filter: grayscale(1); }
        #offlineBar { position: fixed; top: 0; left: 0; width: 100%; z-index: 100; text-align: center; font-size: 12px; font-weight: bold; padding: 8px; transform: translateY(-100%); transition: transform 0.3s ease-in-out; }
        .is-offline { transform: translateY(0) !important; background: #ef4444; color: white; }
        .is-online-back { transform: translateY(0) !important; background: #10b981; color: white; }
        .modal { transition: opacity 0.2s ease-in-out; }
        .modal.hidden { opacity: 0; pointer-events: none; }
        .modal:not(.hidden) { opacity: 1; pointer-events: auto; }
    </style>
</head>
<body class="bg-slate-100 min-h-screen p-4 pt-12 flex flex-col items-center">

    <div id="offlineBar">⚠️ ขาดการเชื่อมต่ออินเทอร์เน็ต</div>

    <div class="max-w-md w-full bg-white rounded-3xl shadow-xl p-6 border border-slate-200 relative overflow-hidden">
        
        <div id="lockBanner" class="hidden absolute top-0 left-0 w-full bg-amber-500 text-white text-[10px] font-bold py-1 text-center uppercase tracking-widest z-10 animate-pulse">
            Locked: รอบนี้ส่งผลครบแล้ว
        </div>
        
        <h1 class="text-2xl font-bold text-center text-slate-800 mb-2 mt-2 uppercase tracking-tight">ระบบส่งผลการแข่งขัน</h1>
        
        <div class="flex flex-col items-center gap-2 mb-6">
            <div id="roundLabel" class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">รอบปัจจุบัน</div>
            <select id="roundPicker" class="bg-blue-50 text-blue-600 font-bold text-sm py-1 px-4 rounded-full border border-blue-100 outline-none cursor-pointer hover:bg-blue-100 transition shadow-sm">
                <option>กำลังโหลด...</option>
            </select>
        </div>

        <div id="mainContent" class="space-y-4">
            <div>
                <label class="text-[10px] font-bold text-slate-400 uppercase ml-1">เลือกรุ่น (Division)</label>
                <select id="divId" class="w-full border-2 rounded-xl p-3 bg-slate-50 outline-none focus:border-blue-500 mt-1 cursor-pointer text-sm font-bold shadow-sm transition"></select>
            </div>
            
            <div class="space-y-3">
                <div class="flex gap-2">
                    <input type="number" id="tableNo" inputmode="numeric" pattern="[0-9]*" placeholder="เลขโต๊ะ" class="flex-1 border-2 rounded-xl p-3 bg-slate-50 text-center font-bold text-lg outline-none focus:border-blue-500 transition shadow-sm">
                    <button id="btnSearch" class="bg-blue-600 text-white px-6 rounded-xl font-bold active:scale-95 transition shadow-sm hover:bg-blue-700">ค้นหา</button>
                </div>

                <div id="actionButtonsArea">
                    <button id="btnCheckin" class="w-full bg-slate-800 text-white py-3 rounded-xl font-semibold text-xs shadow-sm hover:bg-slate-900 transition flex justify-center items-center gap-2">
                        <span>📋</span> เช็คชื่อ / Force Pairing
                    </button>
                    <button id="btnHistory" class="hidden w-full bg-amber-500 text-white py-3 rounded-xl font-semibold text-xs shadow-sm hover:bg-amber-600 transition flex justify-center items-center gap-2">
                        <span>📊</span> ดูผลการแข่งในรอบนี้
                    </button>
                </div>
            </div>

            <div id="matchArea" class="hidden mt-6 pt-6 border-t border-dashed border-slate-200 animate-in fade-in duration-300">
                <div class="bg-blue-50 p-5 rounded-2xl text-center mb-6 border border-blue-100 relative overflow-hidden">
                    <div class="flex justify-between items-center relative z-10">
                        <div class="flex-1 text-slate-900 font-bold text-base leading-tight break-words" id="txtBlackDisp"></div>
                        <div class="px-2 text-4xl font-black text-blue-600 italic tracking-tighter" id="txtScore">?-?</div>
                        <div class="flex-1 text-blue-800 font-bold text-base leading-tight break-words" id="txtWhiteDisp"></div>
                    </div>
                </div>
                
                <p class="text-center text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-3 italic">เลือกผู้ชนะ</p>
                <div id="winnerButtons" class="grid grid-cols-1 gap-3">
                    <button id="btnWinB" class="bg-white border-2 border-slate-800 text-slate-800 p-4 rounded-2xl font-bold text-lg hover:bg-slate-800 hover:text-white transition active:scale-95 shadow-sm"></button>
                    <button id="btnWinW" class="bg-white border-2 border-blue-600 text-blue-600 p-4 rounded-2xl font-bold text-lg hover:bg-blue-600 hover:text-white transition active:scale-95 shadow-sm"></button>
                </div>
            </div>

            <hr class="my-6 border-slate-100">
            
            <div class="w-full bg-emerald-50 text-emerald-700 py-3 rounded-xl font-bold border border-emerald-100 text-sm flex justify-center items-center gap-2">
                <div class="w-2 h-2 bg-emerald-500 rounded-full animate-pulse"></div> สถานะการส่งผล (Real-time)
            </div>
            <div id="gridArea" class="mt-4 animate-in slide-in-from-top-2">
                <div id="statusGrid" class="grid grid-cols-5 sm:grid-cols-8 gap-2 bg-slate-50 p-3 rounded-2xl border border-slate-100"></div>
                <div id="gridSummary" class="text-center text-[10px] font-bold text-slate-400 mt-2 uppercase tracking-widest"></div>
            </div>
        </div>
    </div>

    <div id="playerModal" class="hidden fixed inset-0 bg-black/60 z-50 p-4 flex items-center justify-center modal backdrop-blur-sm">
        <div class="bg-white rounded-3xl w-full max-w-lg shadow-2xl overflow-hidden max-h-[85vh] flex flex-col">
            <div class="p-5 border-b flex justify-between items-center bg-white sticky top-0 z-10">
                <div>
                    <h3 class="text-lg font-bold text-slate-800 leading-tight">เช็คชื่อนักกีฬา</h3>
                    <p class="text-[10px] text-slate-400 font-bold uppercase tracking-wide" id="modalSubTitle"></p>
                </div>
                <button id="closePlayerModal" class="text-3xl text-slate-300 hover:text-slate-500 leading-none transition">&times;</button>
            </div>
            <div class="overflow-auto bg-white flex-1">
                <table class="w-full text-left border-collapse">
                    <thead class="bg-slate-50 text-[10px] uppercase font-bold text-slate-500 sticky top-0 shadow-sm z-10">
                        <tr><th class="p-3 text-center border-r w-12">โต๊ะ</th><th class="p-3">ชื่อ (ดำ / ขาว)</th><th class="p-3 text-center w-10">เช็ค</th><th class="p-3 text-center border-l w-20">Force Pairing</th></tr>
                    </thead>
                    <tbody id="playerTableBody" class="divide-y divide-slate-100 text-sm"></tbody>
                </table>
            </div>
        </div>
    </div>

    <div id="historyModal" class="hidden fixed inset-0 bg-black/60 z-50 p-4 flex items-center justify-center modal backdrop-blur-sm">
        <div class="bg-white rounded-3xl w-full max-w-lg shadow-2xl overflow-hidden max-h-[85vh] flex flex-col">
            <div class="p-5 border-b flex justify-between items-center bg-white sticky top-0 z-10">
                <div>
                    <h3 class="text-lg font-bold text-slate-800 leading-tight">สรุปผลการแข่งขัน</h3>
                    <p class="text-[10px] text-slate-400 font-bold uppercase tracking-wide" id="historyModalSub"></p>
                </div>
                <button id="closeHistoryModal" class="text-3xl text-slate-300 hover:text-slate-500 leading-none transition">&times;</button>
            </div>
            <div class="overflow-auto bg-white flex-1">
                <table class="w-full text-left border-collapse">
                    <thead class="bg-slate-50 text-[10px] uppercase font-bold text-slate-500 sticky top-0 border-b z-10">
                        <tr><th class="p-3 text-center w-12">โต๊ะ</th><th class="p-3">ดำ</th><th class="p-3 text-center w-14 bg-slate-100">ผลการแข่งขัน</th><th class="p-3 text-right">ขาว</th></tr>
                    </thead>
                    <tbody id="historyTableBody" class="divide-y divide-slate-100 text-xs"></tbody>
                </table>
            </div>
        </div>
    </div>

    <div id="forceModal" class="hidden fixed inset-0 bg-black/70 z-[60] flex items-center justify-center p-4 modal backdrop-blur-sm">
        <div class="bg-white rounded-3xl w-full max-w-sm p-6 shadow-2xl transform transition-all scale-100">
            <h3 class="text-lg font-bold mb-5 text-slate-800">Force Pairing โต๊ะ <span id="forceTableLabel" class="text-blue-600 font-black"></span></h3>
            <div class="space-y-4">
                <div><label class="block text-[10px] font-bold text-slate-400 uppercase mb-1">Black</label>
                <select id="forceBlackSelect" class="w-full border rounded-lg p-2 bg-slate-50 font-bold outline-none text-sm mb-1"></select>
                <input type="text" id="forceBlackInput" placeholder="หรือพิมพ์ชื่อใหม่..." class="w-full border rounded-lg p-2 text-sm focus:ring-2 focus:ring-blue-500 outline-none"></div>
                <div><label class="block text-[10px] font-bold text-slate-400 uppercase mb-1">White</label>
                <select id="forceWhiteSelect" class="w-full border rounded-lg p-2 bg-slate-50 font-bold outline-none text-sm mb-1"></select>
                <input type="text" id="forceWhiteInput" placeholder="หรือพิมพ์ชื่อใหม่..." class="w-full border rounded-lg p-2 text-sm focus:ring-2 focus:ring-blue-500 outline-none"></div>
                <div><label class="block text-[10px] font-bold text-slate-400 uppercase mb-1">หมายเหตุ</label>
                <textarea id="forceRemark" placeholder="เช่น สลับคู่เนื่องจาก..." class="w-full border rounded-lg p-2 text-sm outline-none focus:ring-2 focus:ring-blue-500 h-16"></textarea></div>
                <div class="flex gap-3 pt-2"><button id="btnSaveForce" class="flex-1 bg-red-600 text-white py-3 rounded-xl font-bold shadow-lg shadow-red-100 active:scale-95 transition">บันทึก</button><button id="btnCancelForce" class="flex-1 bg-slate-100 text-slate-500 py-3 rounded-xl font-bold active:scale-95 transition hover:bg-slate-200">ยกเลิก</button></div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue, update, get, set } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAk1MAICCrOyqBOCMZ4OXo2aiTsftEZpnk",
            authDomain: "buddygo-tournament.firebaseapp.com",
            databaseURL: "https://buddygo-tournament-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "buddygo-tournament",
            storageBucket: "buddygo-tournament.firebasestorage.app",
            messagingSenderId: "394883099202",
            appId: "1:394883099202:web:526a7a465d11279c141bdb"
        };
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxpR03EfH1fEGPONeL7ikWSD8A176XPjq0p7eiPQ-tgXpRcBKCRIzonWnonNffgDtc5/exec";
        
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let currentRound = "", allNamesList = [], isLocked = false, isHistoryMode = false, currentForceTable = null;
        let realtimePlayers = []; 
        let unsubscribeFirebase = null;

        // UI Helpers
        const toggleModal = (id) => document.getElementById(id).classList.toggle('hidden');
        document.getElementById('closePlayerModal').onclick = () => toggleModal('playerModal');
        document.getElementById('closeHistoryModal').onclick = () => toggleModal('historyModal');
        document.getElementById('btnCancelForce').onclick = () => toggleModal('forceModal');

        // Network Status
        window.addEventListener('online', updateNetworkStatus);
        window.addEventListener('offline', updateNetworkStatus);
        function updateNetworkStatus() {
            const bar = document.getElementById('offlineBar');
            if (navigator.onLine) {
                bar.innerText = "✅ กลับมาออนไลน์แล้ว"; bar.classList.replace('is-offline', 'is-online-back');
                document.body.classList.remove('is-locked-visual'); 
                setTimeout(() => bar.classList.remove('is-online-back'), 2500);
            } else {
                bar.innerText = "⚠️ ขาดการเชื่อมต่ออินเทอร์เน็ต (ห้ามส่งผล)"; bar.classList.add('is-offline');
                document.body.classList.add('is-locked-visual');
            }
        }

        // 1. Load Divisions (จาก GAS ครั้งแรกครั้งเดียวตอนเปิดหน้าเว็บ)
        async function loadDivisions() {
            try {
                const res = await fetch(`${SCRIPT_URL}?action=getDivisions`);
                const data = await res.json();
                if (data.status === "success") {
                    document.getElementById('divId').innerHTML = data.divisions.map(div => `<option value="${div.id}">${div.name}</option>`).join('');
                    autoLoadData();
                }
            } catch (e) { console.error(e); }
        }

        // 2. Auto Load Data (Zero Lag Logic)
        async function autoLoadData(targetRound = "") {
            const div = document.getElementById('divId').value;
            if(!div) return;
            
            if(unsubscribeFirebase) unsubscribeFirebase();

            // เช็คข้อมูล Metadata ใน Firebase ก่อนเลย
            const metaRef = ref(db, `tournaments/${div}/meta`);
            const metaSnap = await get(metaRef);

            if (metaSnap.exists()) {
                // ถ้ามีใน Firebase -> โหลดขึ้นจอทันที
                applyStateFromMeta(metaSnap.val(), targetRound);
                setupFirebaseListener(div, currentRound);
                
                // แอบเช็ค Sheet หลังบ้านเงียบๆ เพื่อความชัวร์
                syncFromGAS(div, targetRound); 
            } else {
                // ถ้ายังไม่มีใน Firebase -> ดึงจาก Sheet แล้วเซฟลง Firebase
                document.getElementById('roundPicker').innerHTML = "<option>กำลังโหลดข้อมูล...</option>";
                await syncFromGAS(div, targetRound);
                
                const newMetaSnap = await get(metaRef);
                if(newMetaSnap.exists()) {
                    applyStateFromMeta(newMetaSnap.val(), targetRound);
                    setupFirebaseListener(div, currentRound);
                }
            }
        }

        function applyStateFromMeta(meta, targetRound) {
            currentRound = targetRound || meta.activeRound;
            allNamesList = meta.allNames || [];
            isHistoryMode = (currentRound != meta.allRounds[0]);

            document.getElementById('roundPicker').innerHTML = meta.allRounds.map(r => `<option value="${r}" ${r == currentRound ? 'selected' : ''}>รอบที่ ${r}</option>`).join('');
            document.getElementById('roundLabel').innerText = isHistoryMode ? "กำลังดูย้อนหลัง" : "รอบปัจจุบัน";
            document.getElementById('roundPicker').className = isHistoryMode ? "bg-amber-100 text-amber-700 font-bold text-sm py-1 px-4 rounded-full border border-amber-200 outline-none cursor-pointer shadow-sm" : "bg-blue-50 text-blue-600 font-bold text-sm py-1 px-4 rounded-full border border-blue-100 outline-none cursor-pointer shadow-sm";
            
            if (isHistoryMode) {
                document.getElementById('btnCheckin').classList.add('hidden');
                document.getElementById('btnHistory').classList.remove('hidden');
            } else {
                document.getElementById('btnCheckin').classList.remove('hidden');
                document.getElementById('btnHistory').classList.add('hidden');
            }
            document.getElementById('modalSubTitle').innerText = `รอบที่ ${currentRound}`;
            document.getElementById('historyModalSub').innerText = `รอบที่ ${currentRound}`;
        }

        function setupFirebaseListener(div, round) {
            if(unsubscribeFirebase) unsubscribeFirebase();
            const matchRef = ref(db, `tournaments/${div}/rounds/${round}/matches`);
            
            unsubscribeFirebase = onValue(matchRef, (snap) => {
                if(snap.exists()) {
                    realtimePlayers = Object.values(snap.val()).sort((a,b) => parseInt(a.table) - parseInt(b.table));
                    updateRealtimeUI();
                } else {
                    realtimePlayers = [];
                    updateRealtimeUI();
                }
            });
        }

        async function syncFromGAS(div, targetRound) {
            try {
                const res = await fetch(`${SCRIPT_URL}?action=list&divId=${div}&targetRound=${targetRound}`);
                const data = await res.json();
                
                if(data.status === "success") {
                    const updates = {};
                    updates[`tournaments/${div}/meta`] = {
                        activeRound: data.round,
                        allRounds: data.allRounds,
                        allNames: data.allNames
                    };

                    const fbMatches = {};
                    data.players.forEach(p => { fbMatches[p.table] = p; });
                    updates[`tournaments/${div}/rounds/${data.round}/matches`] = fbMatches;

                    await update(ref(db), updates);
                }
            } catch (e) { console.error("GAS Sync Error", e); }
        }

        // 3. ฟังก์ชัน Render UI ที่จะทำงานทุกครั้งที่ข้อมูลใน Firebase เปลี่ยน
        function updateRealtimeUI() {
            let sent = 0;
            const gridHTML = realtimePlayers.map(p => {
                if(p.result !== "?-?") sent++;
                return `<div class="aspect-square flex items-center justify-center rounded-lg text-[10px] font-bold shadow-sm transition hover:scale-105 ${p.result !== "?-?" ? 'bg-emerald-500 text-white' : 'bg-red-500 text-white'}">${p.table}</div>`;
            }).join('');
            document.getElementById('statusGrid').innerHTML = gridHTML;
            document.getElementById('gridSummary').innerText = `ส่งแล้ว ${sent} / ${realtimePlayers.length} คู่`;

            isLocked = (realtimePlayers.length > 0 && sent === realtimePlayers.length);
            document.getElementById('lockBanner').classList.toggle('hidden', !isLocked);

            if(!document.getElementById('playerModal').classList.contains('hidden')) renderPlayerTable();
            if(!document.getElementById('historyModal').classList.contains('hidden')) renderHistoryTable();
            
            const currentTableInput = document.getElementById('tableNo').value;
            if(currentTableInput && !document.getElementById('matchArea').classList.contains('hidden')) {
                const match = realtimePlayers.find(p => p.table.toString() === currentTableInput);
                if(match) {
                    document.getElementById('txtBlackDisp').innerText = match.black;
                    document.getElementById('txtWhiteDisp').innerText = match.white;
                    document.getElementById('txtScore').innerText = match.result;
                    document.getElementById('btnWinB').innerText = match.black;
                    document.getElementById('btnWinW').innerText = match.white;
                    document.getElementById('winnerButtons').className = (isHistoryMode || isLocked) ? "grid grid-cols-1 gap-3 is-locked-visual" : "grid grid-cols-1 gap-3";
                }
            }
        }

        // 4. การค้นหาโต๊ะ
        document.getElementById('btnSearch').onclick = () => {
            const tbl = document.getElementById('tableNo').value;
            if(!tbl) return alert("กรุณาระบุเลขโต๊ะ");
            const match = realtimePlayers.find(p => p.table.toString() === tbl);
            if(match) {
                document.getElementById('txtBlackDisp').innerText = match.black;
                document.getElementById('txtWhiteDisp').innerText = match.white;
                document.getElementById('txtScore').innerText = match.result;
                document.getElementById('btnWinB').innerText = match.black;
                document.getElementById('btnWinW').innerText = match.white;
                document.getElementById('winnerButtons').className = (isHistoryMode || isLocked) ? "grid grid-cols-1 gap-3 is-locked-visual" : "grid grid-cols-1 gap-3";
                document.getElementById('matchArea').classList.remove('hidden');
            } else alert("ไม่พบข้อมูลโต๊ะนี้");
        };

        // 5. บันทึกผลการแข่งขัน
        window.submitResultRealtime = async (winner) => {
            if(isHistoryMode || isLocked) return alert("ไม่สามารถแก้ไขผลของรอบนี้ได้");
            const div = document.getElementById('divId').value;
            const tbl = document.getElementById('tableNo').value;
            if(!confirm(`ยืนยันบันทึกผลโต๊ะ ${tbl}?`)) return;

            const scoreResult = (winner === 'Black Win') ? "1-0" : "0-1";
            
            const tableRef = ref(db, `tournaments/${div}/rounds/${currentRound}/matches/${tbl}`);
            await update(tableRef, { result: scoreResult });

            fetch(SCRIPT_URL, {
                method: 'POST',
                body: JSON.stringify({ action: 'result', divId: div, round: currentRound, table: tbl, winner: winner })
            }).catch(e => console.error(e));

            alert("บันทึกสำเร็จ!");
            document.getElementById('tableNo').value = "";
            document.getElementById('matchArea').classList.add('hidden');
        };
        document.getElementById('btnWinB').onclick = () => window.submitResultRealtime('Black Win');
        document.getElementById('btnWinW').onclick = () => window.submitResultRealtime('White Win');

        // 6. เช็คชื่อ
        window.toggleCheckinRealtime = async (table, side, checked) => {
            if(isHistoryMode) return;
            const div = document.getElementById('divId').value;
            const match = realtimePlayers.find(p => p.table.toString() === table.toString());
            
            let newValue = "";
            let current = "";
            if(match.checkB && match.checkW) current = "BOTH";
            else if(match.checkB) current = "B";
            else if(match.checkW) current = "W";

            if (side === "B") newValue = checked ? (current === "W" ? "BOTH" : "B") : (current === "BOTH" ? "W" : "");
            if (side === "W") newValue = checked ? (current === "B" ? "BOTH" : "W") : (current === "BOTH" ? "B" : "");

            const tableRef = ref(db, `tournaments/${div}/rounds/${currentRound}/matches/${table}`);
            await update(tableRef, { 
                checkB: newValue === "B" || newValue === "BOTH",
                checkW: newValue === "W" || newValue === "BOTH"
            });

            fetch(SCRIPT_URL, {
                method: 'POST',
                body: JSON.stringify({ action: 'checkin', divId: div, round: currentRound, table: table, side: side, checked: checked })
            });
        };

        // Render Tables
        function renderPlayerTable() {
            document.getElementById('playerTableBody').innerHTML = realtimePlayers.map(p => `
                <tr class="border-b hover:bg-slate-50 transition">
                    <td rowspan="2" class="p-3 font-bold text-slate-400 border-r w-12 text-center bg-slate-50/50">${p.table}</td>
                    <td class="p-3 font-semibold text-slate-700 leading-tight">${p.black}</td>
                    <td class="p-3 text-center border-l"><input type="checkbox" onchange="window.toggleCheckinRealtime('${p.table}', 'B', this.checked)" ${p.checkB ? 'checked' : ''} ${isHistoryMode ? 'disabled' : ''} class="w-5 h-5 accent-slate-800 cursor-pointer"></td>
                    <td rowspan="2" class="p-3 text-center border-l w-20 bg-white">
                        <button onclick="window.openForceRealtime('${p.table}', '${p.black}', '${p.white}')" class="${isLocked || isHistoryMode ? 'hidden' : ''} bg-indigo-50 text-indigo-600 px-2 py-1.5 rounded-lg text-[10px] font-bold uppercase hover:bg-indigo-100 transition">Force</button>
                    </td>
                </tr>
                <tr class="border-b hover:bg-slate-50 transition"><td class="p-3 font-semibold text-blue-700 leading-tight bg-white">${p.white}</td><td class="p-3 text-center border-l bg-white"><input type="checkbox" onchange="window.toggleCheckinRealtime('${p.table}', 'W', this.checked)" ${p.checkW ? 'checked' : ''} ${isHistoryMode ? 'disabled' : ''} class="w-5 h-5 accent-blue-600 cursor-pointer"></td></tr>
            `).join('');
        }

        function renderHistoryTable() {
            document.getElementById('historyTableBody').innerHTML = realtimePlayers.map(p => `
                <tr class="hover:bg-slate-50 transition border-b border-slate-50">
                    <td class="p-3 text-center font-bold text-slate-300 border-r">${p.table}</td>
                    <td class="p-3 font-semibold text-slate-600 leading-tight">${p.black}</td>
                    <td class="p-3 text-center font-black ${p.result !== "?-?" ? 'text-blue-600 bg-blue-50/30' : 'text-slate-300 bg-slate-50'}">${p.result}</td>
                    <td class="p-3 text-right font-semibold text-slate-600 leading-tight">${p.white}</td>
                </tr>
            `).join('');
        }

        document.getElementById('btnCheckin').onclick = () => { renderPlayerTable(); toggleModal('playerModal'); };
        document.getElementById('btnHistory').onclick = () => { renderHistoryTable(); toggleModal('historyModal'); };

        // 7. Force Pairing
        window.openForceRealtime = (t, b, w) => {
            currentForceTable = t;
            const opts = `<option value="">-- เลือกจากรายชื่อเดิม --</option>` + allNamesList.map(n => `<option value="${n}">${n}</option>`).join('');
            document.getElementById('forceBlackSelect').innerHTML = opts; 
            document.getElementById('forceWhiteSelect').innerHTML = opts;
            document.getElementById('forceBlackSelect').value = allNamesList.includes(b) ? b : "";
            document.getElementById('forceWhiteSelect').value = allNamesList.includes(w) ? w : "";
            document.getElementById('forceBlackInput').value = "";
            document.getElementById('forceWhiteInput').value = "";
            document.getElementById('forceRemark').value = "";
            document.getElementById('forceTableLabel').innerText = t;
            toggleModal('forceModal');
        };

        document.getElementById('btnSaveForce').onclick = async () => {
            const b = document.getElementById('forceBlackInput').value || document.getElementById('forceBlackSelect').value;
            const w = document.getElementById('forceWhiteInput').value || document.getElementById('forceWhiteSelect').value;
            if(!b || !w) return alert("กรุณาระบุชื่อนักกีฬาทั้งสองฝั่ง");
            if(!confirm(`ยืนยัน Force Pairing โต๊ะ ${currentForceTable}?\nดำ: ${b}\nขาว: ${w}`)) return;

            const div = document.getElementById('divId').value;
            const updates = {};
            
            realtimePlayers.forEach(p => {
                if (p.table.toString() !== currentForceTable.toString()) {
                    let changed = false;
                    let pB = p.black, pW = p.white;
                    if (p.black === b || p.black === w) { pB = "ไม่มีผู้เข้าแข่งขัน"; changed = true; }
                    if (p.white === b || p.white === w) { pW = "ไม่มีผู้เข้าแข่งขัน"; changed = true; }
                    if (changed) {
                        updates[`rounds/${currentRound}/matches/${p.table}/black`] = pB;
                        updates[`rounds/${currentRound}/matches/${p.table}/white`] = pW;
                    }
                }
            });

            updates[`rounds/${currentRound}/matches/${currentForceTable}/black`] = b;
            updates[`rounds/${currentRound}/matches/${currentForceTable}/white`] = w;
            updates[`rounds/${currentRound}/matches/${currentForceTable}/remark`] = document.getElementById('forceRemark').value;

            await update(ref(db, `tournaments/${div}`), updates);

            fetch(SCRIPT_URL, {
                method: 'POST',
                body: JSON.stringify({ action: 'force', divId: div, round: currentRound, table: currentForceTable, newBlack: b, newWhite: w, remark: document.getElementById('forceRemark').value })
            });

            alert("บังคับจับคู่สำเร็จ!");
            toggleModal('forceModal');
        };

        // Event Listeners สำหรับ Dropdown
        document.getElementById('divId').onchange = () => autoLoadData();
        document.getElementById('roundPicker').onchange = (e) => autoLoadData(e.target.value);

        // Init
        window.onload = () => { loadDivisions(); updateNetworkStatus(); };
    </script>
</body>
</html>
